<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぺちこのへや</title>

  <style>
    @font-face {
      font-family: "Yurumoji";
      src: url("./yurumoji.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg: #fff7fb;           /* パステル背景 */
      --pink: #d94b8a;         /* 黒寄りピンク */
      --cyan: #4bbfd9;         /* 水色 */
      --line: #f0cfe0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yurumoji", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff7fb 0%, #f6fbff 100%);
      color: var(--pink);
    }

    .page {
      width: min(800px, 90vw);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      margin: 0 0 40px;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 0.08em;
      color: var(--pink);
    }

    .section-title {
      margin: 20px 0 14px;
      font-size: 1.6rem;
      border-bottom: 2px solid var(--line);
      padding-bottom: 6px;
    }

    .sub-list {
      display: flex;           /* 横並び */
      gap: 24px;               /* 間隔 */
      list-style: none;
      padding: 0;
      margin: 10px 0;
    }

    .sub-list li {
      margin: 0;
    }

    a {
      text-decoration: none;
      font-size: 1.4rem;
      color: var(--pink);
      transition: 0.2s;
    }

    a:hover {
      color: var(--cyan);
    }

  </style>
</head>

<body>
  <main class="page">

    <h1>ぺちこのへや</h1>

    <div class="section-title">ゲーム</div>

    <ul class="sub-list">
      <li><a href="nte/index.html">・NTE</a></li>
      <li><a href="#">・原神</a></li>
      <li><a href="#">・スタレ</a></li>
    </ul>

  </main>
</body>
</html>
