<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぺちこのへや</title>

  <style>
    @font-face {
      font-family: "MaruMonica";
      src: url("./x12y16pxMaruMonica.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #fff7fb;
      --pink: #d94b8a;
      --cyan: #4bbfd9;
      --line: #f0cfe0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "MaruMonica", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff7fb 0%, #f6fbff 100%);
      color: var(--pink);
    }

    .page {
      width: min(800px, 90vw);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      margin: 0 0 40px;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 0.08em;
    }

    .section-title {
      margin: 20px 0 14px;
      font-size: 1.6rem;
      border-bottom: 2px solid var(--line);
      padding-bottom: 6px;
    }

    .sub-list {
      display: flex;
      gap: 24px;
      list-style: none;
      padding: 0;
      margin: 10px 0;
    }

    a {
      text-decoration: none;
      font-size: 1.4rem;
      color: var(--pink);
      transition: 0.2s;
    }

    a:hover {
      color: var(--cyan);
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>ぺちこのへや</h1>

    <div class="section-title">ゲーム</div>

    <ul class="sub-list">
      <li><a href="nte/index.html">・NTE</a></li>
      <li><a href="genshin/index.html">・原神</a></li>
      <li><a href="#">・スタレ</a></li>
    </ul>
  </main>
</body>
</html>
