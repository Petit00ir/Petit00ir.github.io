<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぺちこのへや</title>

  <style>
    @font-face {
      font-family: "Yurumoji";
      src: url("./yurumoji.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg: #151322;
      --text: #fff7fb;
      --muted: #c9bfd8;
      --cyan: #79e7ff;
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yurumoji", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 139, 214, 0.26), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(121, 231, 255, 0.18), transparent 30%),
        linear-gradient(135deg, #11101d 0%, #17142a 48%, #241b3d 100%);
    }

    .page {
      width: min(820px, 90vw);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      margin: 0 0 40px;
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      letter-spacing: 0.08em;
      font-weight: normal;
      text-shadow:
        0 0 10px rgba(255, 139, 214, 0.65),
        0 0 18px rgba(121, 231, 255, 0.35);
    }

    .link-list {
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--line);
    }

    .link-list li {
      border-bottom: 1px solid var(--line);
    }

    .link-list a,
    .link-list .disabled {
      display: grid;
      grid-template-columns: 2.4rem 1fr;
      gap: 14px;
      align-items: start;
      padding: 20px 4px;
      color: var(--text);
      text-decoration: none;
    }

    .link-list a {
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .link-list a:hover {
      transform: translateX(6px);
      color: var(--cyan);
    }

    .icon {
      font-size: 1.6rem;
      text-align: center;
    }

    .title {
      display: block;
      font-size: 1.7rem;
      margin-bottom: 6px;
    }

    .desc {
      display: block;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .disabled {
      opacity: 0.55;
    }
  </style>
</head>

<body>
  <main class="page">

    <h1>ぺちこのへや</h1>

    <ul class="link-list">

      <li>
        <a href="nte/index.html">
          <span class="icon">📚</span>
          <span>
            <span class="title">NTE書庫</span>
            <span class="desc">ストーリー文字起こしを本棚みたいにまとめる場所。</span>
          </span>
        </a>
      </li>

      <li>
        <div class="disabled">
          <span class="icon">🧸</span>
          <span>
            <span class="title">準備中</span>
            <span class="desc">あとで追加するまとめ用の入口。</span>
          </span>
        </div>
      </li>

      <li>
        <div class="disabled">
          <span class="icon">✦</span>
          <span>
            <span class="title">準備中</span>
            <span class="desc">別ジャンルの記録やメモを置く場所。</span>
          </span>
        </div>
      </li>

    </ul>

  </main>
</body>
</html>
