<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>picola</title>

<style>
  a{
  text-decoration: none;
  display: inline-block;
  margin-top: 5px;
  padding: 6px 12px;
  background: #f3dede;
  border-radius: 10px;
  color: #5a4a4a;
  font-size: 14px;
}

a:hover{
  background: #eacaca;
}
@font-face {
  font-family: 'yurumoji';
  src: url('yurumoji.ttf') format('truetype');
}
body{
  background:#fff6f8;
}

.box{
  border:2px solid #f2b6c1;
  background:#ffffff;
}

.title{
  background:#f2b6c1;
}

a{
  background:#e59aa8;
  color:#5a4a57;
}

a:hover{
  background:#d97b8b;
}
/* タイトル */
header{
  text-align:center;
  padding:40px 0;
}
header h1{
  font-size:32px;
  margin:0;
}

/* 全体枠 */
.container{
  width:900px;
  margin:0 auto;
}

/* 共通ボックス */
.box{
  border:2px solid #e5cfcf;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  background:white;
}

/* おしらせ */
.release{
  height:120px;
}

/* 下段レイアウト */
.grid{
  display:flex;
  gap:20px;
}

/* こんにちは */
.profile{
  width:250px;
}

/* 右側 */
.right{
  flex:1;
}

.item{
  height:80px;
  margin-bottom:15px;
}

/* 見出し */
.title{
  background:#f3dede;
  padding:5px 10px;
  border-radius:10px;
  display:inline-block;
  margin-bottom:10px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>ぺちのおうち</h1>
</header>

<div class="container">

  <!-- リリース -->
  <div class="box release">
    <div class="title">おしらせ</div>
    <p>・サイトをつくったよ</p>
  </div>

  <div class="grid">

    <!-- こんにちは -->
    <div class="box profile">
      <div class="title">こんにちは</div>
      <p>おえかきとパソコンがすきです</p>
    <p>
  <a href="https://x.com/pech_yuimar" target="_blank">X</a>
</p>
<p>
  <a href="https://www.instagram.com/pech_yuimar?igsh=dXQ2eWJxem8wZTE0&utm_source=qr" target="_blank">Instagram</a>
</p>
    </div>

    <!-- 右側 -->
    <div class="right">

      <div class="box item">
        <div class="title">いろいろ</div>
      </div>

      <div class="box item">
        <div class="title">おしながき</div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
