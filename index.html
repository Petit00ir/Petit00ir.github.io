<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぺちこのへや</title>

  <style>
    @font-face {
      font-family: "Yurumoji";
      src: url("./yurumoji.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg: #151322;
      --text: #fff7fb;
      --muted: #c9bfd8;
      --cyan: #79e7ff;
      --line: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yurumoji", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 139, 214, 0.26), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(121, 231, 255, 0.18), transparent 30%),
        linear-gradient(135deg, #11101d 0%, #17142a 48%, #241b3d 100%);
    }

    .page {
      width: min(820px, 90vw);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      margin: 0 0 40px;
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      letter-spacing: 0.08em;
      font-weight: normal;
      text-shadow:
        0 0 10px rgba(255, 139, 214, 0.65),
        0 0 18px rgba(121, 231, 255, 0.35);
    }

    .section-title {
      margin: 20px 0 10px;
      font-size: 1.6rem;
    }

    .list {
      list-style: none;
      padding: 0;
      margin: 0;
      border-top: 1px solid var(--line);
    }

    .list li {
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }

    .sub-list {
      list-style: none;
      padding-left: 20px;
      margin: 8px 0 0;
    }

    .sub-list li {
      margin: 6px 0;
    }

    a {
      color: var(--text);
      text-decoration: none;
      white-space: nowrap; /* 改行防止 */
    }

    a:hover {
      color: var(--cyan);
    }

  </style>
</head>

<body>
  <main class="page">

    <h1>ぺちこのへや</h1>

    <div class="section-title">ゲーム</div>

    <ul class="list">
      <li>
        <ul class="sub-list">
          <li><a href="nte/index.html">・NTE</a></li>
          <li><a href="#">・原神</a></li>
        </ul>
      </li>
    </ul>

  </main>
</body>
</html>
