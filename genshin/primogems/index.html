<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>原石計算</title>

  <style>
    @font-face {
      font-family: "mainFont";
      src: url("../../x12y16pxMaruMonica.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #fff7fb;
      --pink: #d94b8a;
      --cyan: #4bbfd9;
      --line: #f0cfe0;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "mainFont", "Yu Gothic", sans-serif;
      color: var(--pink);
      background:
        radial-gradient(circle, rgba(217, 75, 138, 0.10) 1px, transparent 1px),
        linear-gradient(180deg, #fff7fb 0%, #f6fbff 100%);
      background-size: 18px 18px, 100% 100%;
    }

    .page {
      width: min(920px, 92vw);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      margin: 0 0 36px;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 0.08em;
      color: var(--pink);
      text-shadow:
        3px 3px 0 var(--white),
        -3px 3px 0 var(--white),
        3px -3px 0 var(--white),
        -3px -3px 0 var(--white),
        0 6px 0 #f5c8dc;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .box {
      padding: 24px;
      border: 4px dashed var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 0 #f6d7e7;
    }

    .title {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 12px;
      align-items: center;
      margin: 12px 0;
      font-size: 1.1rem;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid var(--line);
      border-radius: 10px;
      color: var(--pink);
      background: var(--white);
      font-family: inherit;
      font-size: 1.1rem;
    }

    input[type="checkbox"] {
  width: 22px;
  height: 22px;
  accent-color: #d94b8a;
  cursor: pointer;
}

input[type="checkbox"]:hover {
  transform: scale(1.1);
}

    .result {
      font-size: 1.25rem;
      line-height: 2;
    }

    .big {
      font-size: 2rem;
      color: var(--cyan);
    }

    button {
      margin-top: 20px;
      padding: 10px 18px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--pink);
      font-family: inherit;
      font-size: 1.1rem;
      cursor: pointer;
    }

    button:hover {
      color: var(--cyan);
      transform: translateY(-2px);
    }

    a {
      display: inline-block;
      margin-top: 36px;
      color: var(--pink);
      text-decoration: none;
      font-size: 1.2rem;
    }

    a:hover {
      color: var(--cyan);
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }

      label {
        grid-template-columns: 1fr;
      }

      input[type="checkbox"] {
        justify-self: start;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>原石計算</h1>

    <div class="grid">
      <section class="box">
        <div class="title">目標</div>

        <label>キャラ凸数 <input id="charaConstellation" type="number" value="0"></label>
        <label>武器本数 <input id="weaponCount" type="number" value="0"></label>
        <label>PU予定日 <input id="targetDate" type="date"></label>
        <label>課金予算 <input id="budget" type="number" value="0"></label>
      </section>

      <section class="box">
        <div class="title">持っているもの・増える分</div>

        <label>デイリーを入れる <input id="dailyEnabled" type="checkbox" checked></label>
        <label>空月を入れる <input id="welkinEnabled" type="checkbox"></label>
        <label>腕試し回数 <input id="trialCount" type="number" value="0"></label>
        <label>今あるガチャ石 <input id="currentFate" type="number" value="0"></label>
        <label>今ある原石 <input id="currentStone" type="number" value="0"></label>
        <label>キャラガチャ履歴 <input id="charaHistory" type="number" value="0"></label>
        <label>武器ガチャ履歴 <input id="weaponHistory" type="number" value="0"></label>
      </section>
    </div>

    <section class="box" style="margin-top: 28px;">
      <div class="title">計算結果</div>

      <div class="result">
        あと何日：<span id="remainDays" class="big">0</span> 日<br>
        必要原石：<span id="totalNeed" class="big">0</span><br>
        確保予定：<span id="obtained" class="big">0</span><br>
        不足原石：<span id="shortage" class="big">0</span><br>
        スターダスト換算：<span id="stardustPull" class="big">0</span> 回分
      </div>

      <button onclick="resetSavedData()">保存データをリセット</button>
    </section>

    <a href="../index.html">← 原神ページにもどる</a>
  </main>

  <script>
    const STORAGE_KEY = "picola_primogems_calculator";

    const ids = [
      "charaConstellation",
      "weaponCount",
      "targetDate",
      "budget",
      "dailyEnabled",
      "welkinEnabled",
      "trialCount",
      "currentFate",
      "currentStone",
      "charaHistory",
      "weaponHistory"
    ];

    window.addEventListener("DOMContentLoaded", () => {
      loadData();

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;

        el.addEventListener("input", () => {
          saveData();
          calc();
        });

        el.addEventListener("change", () => {
          saveData();
          calc();
        });
      });

      calc();
    });

    function num(id) {
      return Number(document.getElementById(id).value) || 0;
    }

    function checked(id) {
      return document.getElementById(id).checked;
    }

    function saveData() {
      const data = {};

      ids.forEach(id => {
        const el = document.getElementById(id);
        data[id] = el.type === "checkbox" ? el.checked : el.value;
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;

      const data = JSON.parse(saved);

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el || data[id] === undefined) return;

        if (el.type === "checkbox") {
          el.checked = data[id];
        } else {
          el.value = data[id];
        }
      });
    }

    function daysUntil(dateText) {
      if (!dateText) return 0;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const target = new Date(dateText);
      target.setHours(0, 0, 0, 0);

      const diff = target - today;
      return Math.max(Math.ceil(diff / 86400000), 0);
    }

    function calc() {
      const charaNeed = num("charaConstellation") * 180 * 160;
      const weaponNeed = num("weaponCount") * 180 * 160;
      const totalNeed = charaNeed + weaponNeed;

      const remainDays = daysUntil(document.getElementById("targetDate").value);

      const budgetStone = num("budget") / 12000 * 6480;
      const dailyStone = checked("dailyEnabled") ? remainDays * 60 : 0;
      const welkinStone = checked("welkinEnabled") ? remainDays * 90 : 0;
      const trialStone = num("trialCount") * 20;

      const currentFateStone = num("currentFate") * 160;
      const currentStone = num("currentStone");

      const charaHistoryStone = num("charaHistory") * 160;
      const weaponHistoryStone = num("weaponHistory") * 160;

      const obtained =
        budgetStone +
        dailyStone +
        welkinStone +
        trialStone +
        currentFateStone +
        currentStone +
        charaHistoryStone +
        weaponHistoryStone;

      const shortage = Math.max(totalNeed - obtained, 0);
      const stardustPull = shortage / 1600;

      document.getElementById("remainDays").textContent = remainDays;
      document.getElementById("totalNeed").textContent = Math.ceil(totalNeed).toLocaleString();
      document.getElementById("obtained").textContent = Math.ceil(obtained).toLocaleString();
      document.getElementById("shortage").textContent = Math.ceil(shortage).toLocaleString();
      document.getElementById("stardustPull").textContent = stardustPull.toFixed(2);
    }

    function resetSavedData() {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  </script>
</body>
</html>
