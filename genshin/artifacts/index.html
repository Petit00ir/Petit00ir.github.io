<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>せいいぶつ</title>

  <style>
    @font-face {
      font-family: "mainFont";
      src: url("../../x12y16pxMaruMonica.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --pink: #d94b8a;
      --cyan: #4bbfd9;
      --line: #f0cfe0;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "mainFont", "Yu Gothic", sans-serif;
      color: var(--pink);
      background:
        radial-gradient(circle, rgba(217, 75, 138, 0.10) 1px, transparent 1px),
        linear-gradient(180deg, #fff7fb 0%, #f6fbff 100%);
      background-size: 18px 18px, 100% 100%;
    }

    .page {
      width: min(1180px, 92vw);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      margin: 0 0 44px;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 0.08em;
    }

    .character {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 42px;
      align-items: center;
    }

    .character-img {
      width: 100%;
      max-width: 500px;
      image-rendering: pixelated;
      transition: transform 0.18s ease, filter 0.18s ease;
      cursor: pointer;
    }

    .character-img:hover {
      transform: translateY(-8px) rotate(-2deg) scale(1.03);
      filter: drop-shadow(0 10px 0 #f6d7e7);
    }

    .memo-card {
      padding: 26px;
      border: 4px dashed var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.75);
      box-shadow: 0 10px 0 #f6d7e7;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .memo-card:hover {
      transform: translateY(-6px);
      border-color: #f4b9d5;
      box-shadow: 0 14px 0 #f6d7e7;
    }

    .memo-title {
      font-size: 1.6rem;
      margin-bottom: 16px;
    }

    .memo-main {
      line-height: 1.9;
      font-size: 1.15rem;
      margin-bottom: 18px;
    }

    .done {
      color: var(--cyan);
    }

    .memo-sub {
      border-top: 2px solid var(--line);
      padding-top: 16px;
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .artifact-row {
      display: flex;
      gap: 18px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .artifact-box {
      width: 92px;
      text-align: center;
    }

    .artifact {
      width: 90px;
      image-rendering: pixelated;
      transition: transform 0.15s ease, filter 0.15s ease;
      cursor: pointer;
    }

    .artifact:hover {
      transform: translateY(-6px) scale(1.1);
      filter: drop-shadow(0 6px 0 #f6d7e7);
    }

    .artifact-stat {
      margin-top: 6px;
      font-size: 0.85rem;
      line-height: 1.3;
    }

    a {
      display: inline-block;
      margin-top: 40px;
      color: var(--pink);
      text-decoration: none;
      font-size: 1.2rem;
      transition: transform 0.15s ease, color 0.15s ease;
    }

    a:hover {
      color: var(--cyan);
      transform: translateY(-2px);
    }

    @media (max-width: 850px) {
      .character {
        grid-template-columns: 1fr;
      }

      .character-img {
        max-width: 420px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <h1>せいいぶつ</h1>

    <div class="character">

      <div>
        <img class="character-img" src="../../item/Kachina.png" alt="カチーナ">
      </div>

      <div class="memo-card">
        <div class="memo-title">カチーナ</div>

        <div class="memo-main">
          防御 2030 → 目標 2200<br>
          率 50.1 → 目標 100<br>
          <span class="done">ダメ 200 → 達成</span>
        </div>

        <div class="memo-sub">
          初期値（7.3-3.9-7.8が最大）<br>
          ・花　6.6-2.7-7.8<br>
          ・羽　6.6-2.7-7.8<br>
          ・砂　0.0-3.9-7.0<br>
          ・杯　5.8-0.0-7.8<br>
          ・冠　5.8-3.5-0.0
        </div>

        <div class="artifact-row">
          <div class="artifact-box">
            <img class="artifact" src="../../item/Kokuyo/1_pixelart.png" alt="花">
            <div class="artifact-stat">花<br>6.6-2.7-7.8</div>
          </div>

          <div class="artifact-box">
            <img class="artifact" src="../../item/Kokuyo/2_pixelart.png" alt="羽">
            <div class="artifact-stat">羽<br>6.6-2.7-7.8</div>
          </div>

          <div class="artifact-box">
            <img class="artifact" src="../../item/Kokuyo/3_pixelart.png" alt="砂">
            <div class="artifact-stat">砂<br>0.0-3.9-7.0</div>
          </div>

          <div class="artifact-box">
            <img class="artifact" src="../../item/Kokuyo/4_pixelart.png" alt="杯">
            <div class="artifact-stat">杯<br>5.8-0.0-7.8</div>
          </div>

          <div class="artifact-box">
            <img class="artifact" src="../../item/Kokuyo/5_pixelart.png" alt="冠">
            <div class="artifact-stat">冠<br>5.8-3.5-0.0</div>
          </div>
        </div>

      </div>

    </div>

    <a href="../index.html">← もどる</a>

  </main>
</body>
</html>
