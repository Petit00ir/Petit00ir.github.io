<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>せいいぶつ</title>

  <style>
    @font-face {
      font-family: "MaruMonica";
      src: url("../../x12y16pxMaruMonica.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --pink: #d94b8a;
      --cyan: #4bbfd9;
      --line: #f0cfe0;
    }

    body {
      margin: 0;
      padding: 40px;
      font-family: "MaruMonica", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff7fb, #f6fbff);
      color: var(--pink);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 28px;
    }

    .character {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      margin-bottom: 36px;
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    .memo-box {
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 16px 20px;
      background: #ffffffcc;
    }

    .memo-title {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    .memo-list {
      line-height: 2;
      font-size: 1.2rem;
    }

    .done {
      color: var(--cyan);
    }

    .sub {
      margin-top: 14px;
      font-size: 1.1rem;
      line-height: 1.8;
    }

    a {
      color: var(--pink);
      text-decoration: none;
    }

    a:hover {
      color: var(--cyan);
    }
  </style>
</head>

<body>

<h1>せいいぶつ</h1>

<div class="character">

  <div>
    <img src="images/kachina.jpg" alt="カチーナ">
  </div>

  <div>
    <div class="memo-box">

      <div class="memo-title">カチーナ</div>

      <div class="memo-list">
        ぼうぎょ 2030 → 目標 2200<br>
        りつ 50.1 → 目標 100<br>
        <span class="done">ダメ 200 → 達成</span>
      </div>

      <div class="sub">
        初期値（7.3-3.9-7.8が最大）<br>
        ・花　6.6-2.7-7.8<br>
        ・羽　6.6-2.7-7.8<br>
        ・砂　0.0-3.9-7.0<br>
        ・杯　5.8-0.0-7.8<br>
        ・冠　5.8-3.5-0.0
      </div>

    </div>
  </div>

</div>

<a href="../index.html">← もどる</a>

</body>
</html>
