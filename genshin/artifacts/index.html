<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>聖遺物</title>

  <style>
    @font-face {
      font-family: "mainFont";
      src: url("../../x12y16pxMaruMonica.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --pink: #d94b8a;
      --cyan: #4bbfd9;
      --line: #f0cfe0;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "mainFont", "Yu Gothic", sans-serif;
      color: var(--pink);
      background:
        radial-gradient(circle, rgba(217, 75, 138, 0.10) 1px, transparent 1px),
        linear-gradient(180deg, #fff7fb 0%, #f6fbff 100%);
      background-size: 18px 18px, 100% 100%;
    }

    .page {
      width: min(1180px, 92vw);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    h1 {
      margin: 0 0 34px;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 0.08em;
      color: var(--pink);
      text-shadow:
        3px 3px 0 var(--white),
        -3px 3px 0 var(--white),
        3px -3px 0 var(--white),
        -3px -3px 0 var(--white),
        0 6px 0 #f5c8dc;
    }

    .character-icons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 38px;
      flex-wrap: wrap;
    }

    .icon-button {
      width: 76px;
      height: 76px;
      padding: 6px;
      border: 4px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 6px 0 #f6d7e7;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .icon-button img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .icon-button.active:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 0 #f6d7e7;
}
    
    .character {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 42px;
      align-items: center;
    }

    .left-area {
      text-align: center;
    }

    .character-box {
      position: relative;
      display: inline-block;
    }

    .character-img {
      width: 100%;
      max-width: 500px;
      image-rendering: pixelated;
      transition: transform 0.18s ease, filter 0.18s ease;
      cursor: pointer;
    }

    .character-img:hover {
      transform: translateY(-8px) rotate(-2deg) scale(1.03);
      filter: drop-shadow(0 10px 0 #f6d7e7);
    }

    .total-hover {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      background: rgba(255, 247, 251, 0.95);
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 6px 12px;
      color: var(--pink);
      opacity: 0;
      pointer-events: none;
      transition: 0.15s;
      box-shadow: 0 4px 0 #f6d7e7;
    }

    .character-box:hover .total-hover {
      opacity: 1;
    }

    .artifact-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .artifact-box {
      position: relative;
      width: 70px;
      height: 70px;
    }

    .artifact {
      width: 70px;
      image-rendering: pixelated;
      transition: transform 0.15s ease, filter 0.15s ease;
      cursor: pointer;
    }

    .artifact:hover {
      transform: translateY(-6px) scale(1.1);
      filter: drop-shadow(0 6px 0 #f6d7e7);
    }

    .artifact-hover {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.95rem;
      background: var(--white);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 3px 8px;
      opacity: 0;
      pointer-events: none;
      transition: 0.15s;
      white-space: nowrap;
      color: var(--pink);
    }

    .artifact-box:hover .artifact-hover {
      opacity: 1;
    }

    .memo-card {
      padding: 26px;
      border: 4px dashed var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.75);
      box-shadow: 0 10px 0 #f6d7e7;
      transition: transform 0.18s ease;
    }

    .memo-card:hover {
      transform: translateY(-6px);
    }

    .memo-title {
      font-size: 1.6rem;
      margin-bottom: 16px;
    }

    .memo-main {
      line-height: 1.9;
      font-size: 1.15rem;
      margin-bottom: 18px;
    }

    .done {
      color: var(--cyan);
    }

    .memo-sub {
      border-top: 2px solid var(--line);
      padding-top: 16px;
      font-size: 1.05rem;
      line-height: 1.8;
    }

    a {
      display: inline-block;
      margin-top: 40px;
      color: var(--pink);
      text-decoration: none;
      font-size: 1.2rem;
      transition: transform 0.15s ease, color 0.15s ease;
    }

    a:hover {
      color: var(--cyan);
      transform: translateY(-2px);
    }

    @media (max-width: 850px) {
      .character {
        grid-template-columns: 1fr;
      }

      .artifact-hover {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <h1>聖遺物</h1>

    <div class="character-icons">
    <button class="icon-button active" data-character="kachina">
      <img src="../../item/Chara/Kachina-icon.png" alt="カチーナ">
    </button>
  
    <button class="icon-button" data-character="xilonen">
      <img src="../../item/Chara/Xilonen-icon.png" alt="シロネン">
    </button>
    </div>

    <div class="character">

      <div class="left-area">

        <div class="character-box">
          <img id="characterImage" class="character-img" src="" alt="">
          <div id="totalScore" class="total-hover"></div>
        </div>

        <div id="artifactRow" class="artifact-row"></div>

      </div>

      <div class="memo-card">
        <div id="memoTitle" class="memo-title"></div>
        <div id="memoMain" class="memo-main"></div>
        <div id="memoSub" class="memo-sub"></div>
      </div>

    </div>

    <a href="../index.html">← もどる</a>

  </main>

  <script>
    const characters = {
      kachina: {
        name: "カチーナ",
        image: "../../item/Chara/Kachina.png",
        icon: "../../item/Chara/Kachina-icon.png",
        total: "208.7",
        artifacts: [
          { image: "../../item/Emaki/1_pixelart.png", score: "47.8", alt: "花" },
          { image: "../../item/Emaki/2_pixelart.png", score: "52.8", alt: "羽" },
          { image: "../../item/Emaki/3_pixelart.png", score: "35.0", alt: "砂" },
          { image: "../../item/Emaki/4_pixelart.png", score: "36.9", alt: "杯" },
          { image: "../../item/Emaki/5_pixelart.png", score: "36.2", alt: "冠" }
        ],
        memoMain: `
          防御 2030 → 目標 2200<br>
          率 50.1 → 目標 100<br>
          <span class="done">ダメ 200 → 達成</span>
        `,
        memoSub: `
          初期値（7.3-3.9-7.8が最大）<br>
          ・花　6.6-2.7-7.8<br>
          ・羽　6.6-2.7-7.8<br>
          ・砂　0.0-3.9-7.0<br>
          ・杯　5.8-0.0-7.8<br>
          ・冠　5.8-3.5-0.0
        `
      },

      xilonen: {
        name: "シロネン",
        image: "../../item/Chara/Xilonen.png",
        icon: "../../item/Chara/Xilonen-icon.png",
        artifacts: [
          { image: "../../item/Kokuyo/6_pixelart.png", score: "47.8", alt: "花" },
          { image: "../../item/Kokuyo/7_pixelart.png", score: "42.6", alt: "羽" },
          { image: "../../item/Kokuyo/8_pixelart.png", score: "30.3", alt: "砂" },
          { image: "../../item/Kokuyo/9_pixelart.png", score: "34.0", alt: "杯" },
          { image: "../../item/Kokuyo/10_pixelart.png", score: "33.4", alt: "冠" }
        ],
        memoMain: `
          <span class="done">防御3000 → 達成</span><br>
          率 42.3 → 目標 60<br>
          ダメ 155.7 → 目標 200
        `,
        memoSub: `
          初期値（7.3-3.9-7.8が最大）<br>
          ・花　6.6-3.5-6.2<br>
          ・羽　7.3-2.7-5.4<br>
          ・砂　0.0-3.1-5.4<br>
          ・杯　6.6-3.9-0.0<br>
          ・冠　6.6-3.5-0.0
        `
    }
    };

    function showCharacter(characterId) {
      const data = characters[characterId];

      if (!data) return;

      document.getElementById("characterImage").src = data.image;
      document.getElementById("characterImage").alt = data.name;
      const total = data.artifacts.reduce((sum, artifact) => {
      return sum + Number(artifact.score);
      }, 0);

      document.getElementById("totalScore").textContent = `TOTAL：${total.toFixed(1)}`;

      document.getElementById("memoTitle").textContent = data.name;
      document.getElementById("memoMain").innerHTML = data.memoMain;
      document.getElementById("memoSub").innerHTML = data.memoSub;

      const artifactRow = document.getElementById("artifactRow");
      artifactRow.innerHTML = "";

      data.artifacts.forEach(artifact => {
        artifactRow.innerHTML += `
          <div class="artifact-box">
            <img class="artifact" src="${artifact.image}" alt="${data.name} ${artifact.alt}">
            <div class="artifact-hover">${artifact.score}</div>
          </div>
        `;
      });

      document.querySelectorAll(".icon-button").forEach(button => {
        button.classList.toggle("active", button.dataset.character === characterId);
      });
    }

    document.querySelectorAll(".icon-button").forEach(button => {
      button.addEventListener("click", () => {
        showCharacter(button.dataset.character);
      });
    });

    showCharacter("kachina");
  </script>
</body>
</html>
